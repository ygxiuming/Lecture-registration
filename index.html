<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支持开源 | 修明</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 48px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .coffee-icon {
            font-size: 64px;
            margin-bottom: 16px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .author {
            color: #667eea;
            font-weight: 600;
            font-size: 18px;
        }

        .description {
            background: linear-gradient(135deg, #f6f8fb 0%, #e9ecef 100%);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 36px;
            border-left: 4px solid #667eea;
        }

        .description p {
            color: #4a5568;
            font-size: 15px;
            line-height: 1.8;
        }

        .qr-container {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .qr-item {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            flex: 1;
            min-width: 220px;
            max-width: 250px;
        }

        .qr-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
        }

        .qr-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .alipay-label {
            color: #1677ff;
            font-weight: 600;
            font-size: 18px;
        }

        .wechat-label {
            color: #07c160;
            font-weight: 600;
            font-size: 18px;
        }

        .qr-code {
            width: 100%;
            height: auto;
            border-radius: 12px;
            border: 3px solid #f7fafc;
        }

        .footer {
            text-align: center;
            margin-top: 36px;
            padding-top: 24px;
            border-top: 2px solid #e2e8f0;
        }

        .footer p {
            color: #718096;
            font-size: 14px;
            line-height: 1.6;
        }

        .heart {
            color: #e53e3e;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.2);
            }
            50% {
                transform: scale(1);
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 32px 24px;
            }

            h1 {
                font-size: 26px;
            }

            .qr-container {
                flex-direction: column;
                align-items: center;
            }

            .qr-item {
                max-width: 100%;
            }
        }
    </style>
</head>
